<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>💰 Boyu 財務管理</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #F0EBE1;
      min-height: 100vh;
      padding-bottom: 80px;
      color: #1A1A1A;
    }

    /* Header */
    .app-header {
      position: sticky; top: 0; z-index: 100;
      background: #F0EBE1; padding: 20px 16px 10px;
      display: flex; align-items: center; justify-content: center;
    }
    .app-title { font-size: 1.3rem; font-weight: 700; }
    .sync-dot {
      width: 8px; height: 8px; border-radius: 50%; background: #CCC;
      position: absolute; right: 20px; transition: background 0.3s;
    }
    .sync-dot.ok      { background: #4CAF50; }
    .sync-dot.err     { background: #F44336; }
    .sync-dot.loading { background: #FF9800; animation: pulse 1s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }

    /* Bottom Nav */
    .bottom-nav {
      position: fixed; bottom: 0; left: 0; right: 0;
      background: white; border-top: 1px solid #EEE;
      display: flex; z-index: 200;
      padding-bottom: env(safe-area-inset-bottom, 0);
    }
    .nav-btn {
      flex: 1; display: flex; flex-direction: column; align-items: center;
      padding: 9px 0 7px; border: none; background: none; cursor: pointer;
      color: #BBB; font-size: 0.65rem; gap: 3px; font-family: inherit; transition: color 0.15s;
    }
    .nav-btn.active { color: #1C1C1C; }
    .nav-icon { font-size: 1.2rem; line-height: 1; }

    /* Container & Views */
    .container { max-width: 640px; margin: 0 auto; padding: 0 16px; }
    .view { display: none; padding-bottom: 20px; }
    .view.active { display: block; }

    /* Stats row */
    .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 16px; }
    .stat-card {
      background: white; border-radius: 16px; padding: 14px 8px;
      text-align: center; box-shadow: 0 1px 6px rgba(0,0,0,0.07);
    }
    .stat-label { font-size: 0.68rem; color: #999; margin-bottom: 6px; }
    .stat-value { font-size: 1rem; font-weight: 700; }
    .c-income  { color: #2E7D32; }
    .c-expense { color: #C62828; }

    /* Card */
    .card {
      background: white; border-radius: 20px; padding: 20px;
      margin-bottom: 14px; box-shadow: 0 1px 6px rgba(0,0,0,0.07);
    }
    .card-title { font-size: 0.95rem; font-weight: 600; margin-bottom: 14px; }

    /* Toggle */
    .toggle {
      display: grid; grid-template-columns: 1fr 1fr;
      border: 1.5px solid #E2E2E2; border-radius: 12px; overflow: hidden; margin-bottom: 14px;
    }
    .toggle-btn {
      padding: 10px; text-align: center; border: none; background: white;
      cursor: pointer; font-size: 0.88rem; color: #AAA; font-family: inherit; transition: all 0.15s;
    }
    .on-expense { background: #FFF0F0; color: #C62828; font-weight: 600; }
    .on-income  { background: #EEF6EE; color: #2E7D32; font-weight: 600; }

    /* Form */
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
    .form-group { display: flex; flex-direction: column; gap: 4px; margin-bottom: 10px; }
    .form-label { font-size: 0.75rem; color: #777; }
    input, select, textarea {
      border: 1.5px solid #E5E5E5; border-radius: 10px; padding: 9px 11px;
      font-size: 0.88rem; color: #1A1A1A; background: white; width: 100%;
      outline: none; font-family: inherit; -webkit-appearance: none; transition: border-color 0.15s;
    }
    input:focus, select:focus, textarea:focus { border-color: #999; }
    textarea { resize: vertical; min-height: 68px; }

    .btn-primary {
      width: 100%; padding: 13px; background: #1C1C1C; color: white;
      border: none; border-radius: 12px; font-size: 0.92rem; font-weight: 600;
      cursor: pointer; font-family: inherit; transition: background 0.15s;
    }
    .btn-primary:hover { background: #333; }
    .btn-primary:disabled { background: #AAA; cursor: not-allowed; }
    .btn-secondary {
      width: 100%; padding: 11px; background: white; color: #555;
      border: 1.5px solid #E2E2E2; border-radius: 12px; font-size: 0.85rem;
      cursor: pointer; font-family: inherit; transition: background 0.15s;
    }
    .btn-secondary:hover { background: #F5F5F5; }

    /* Edit banner */
    .edit-banner {
      display: none; background: #FFF8E1; border-radius: 10px;
      padding: 9px 14px; margin-bottom: 10px;
      font-size: 0.8rem; color: #795548;
      align-items: center; justify-content: space-between;
    }
    .edit-banner.show { display: flex; }
    .btn-cancel-edit { background: none; border: none; cursor: pointer; color: #795548; font-size: 0.8rem; text-decoration: underline; font-family: inherit; }

    /* Filter */
    .filter-bar { display: flex; gap: 8px; margin-bottom: 14px; flex-wrap: wrap; }
    .filter-bar select { flex: 1; min-width: 70px; padding: 8px 10px; font-size: 0.8rem; border-radius: 10px; }
    .btn-export { padding: 8px 14px; background: white; border: 1.5px solid #E2E2E2; border-radius: 10px; font-size: 0.8rem; cursor: pointer; white-space: nowrap; color: #555; font-family: inherit; }
    .btn-export:hover { background: #F5F5F5; }

    /* Transaction list */
    .list-header { font-size: 0.8rem; color: #888; margin-bottom: 12px; }
    .tx-item { display: flex; align-items: center; gap: 10px; padding: 10px 0; border-bottom: 1px solid #F3F3F3; }
    .tx-item:last-child { border-bottom: none; }
    .tx-icon { width: 38px; height: 38px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 0.95rem; flex-shrink: 0; }
    .bg-income  { background: #E8F5E9; }
    .bg-expense { background: #FFF3E0; }
    .tx-info { flex: 1; min-width: 0; }
    .tx-title { font-size: 0.85rem; font-weight: 500; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .tx-sub   { font-size: 0.7rem; color: #AAA; margin-top: 2px; }
    .tx-right { display: flex; align-items: center; gap: 6px; flex-shrink: 0; }
    .tx-amount { font-size: 0.88rem; font-weight: 700; }
    .btn-icon { background: none; border: none; cursor: pointer; color: #CCC; font-size: 0.82rem; padding: 3px; transition: color 0.15s; line-height: 1; }
    .btn-icon:hover { color: #666; }
    .btn-icon.del:hover { color: #E53935; }
    .tx-proj-tag { display: inline-block; font-size: 0.62rem; padding: 1px 5px; border-radius: 5px; margin-left: 4px; vertical-align: middle; }

    /* Section */
    .section-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; }
    .section-title  { font-size: 0.95rem; font-weight: 600; }
    .section-divider { height: 1px; background: #F0F0F0; margin: 14px 0; }

    /* Period toggle */
    .period-toggle { display: flex; gap: 4px; }
    .period-btn { padding: 5px 12px; border: 1.5px solid #E2E2E2; border-radius: 8px; font-size: 0.75rem; background: white; cursor: pointer; font-family: inherit; color: #888; transition: all 0.15s; }
    .period-btn.active { background: #1C1C1C; color: white; border-color: #1C1C1C; }

    /* Breakdown */
    .breakdown-title { font-size: 0.72rem; font-weight: 600; color: #999; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 10px; }
    .bk-row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
    .bk-cat { font-size: 0.8rem; width: 100px; flex-shrink: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .bk-bar-wrap { flex: 1; background: #F0F0F0; border-radius: 4px; height: 8px; overflow: hidden; }
    .bk-bar { height: 100%; border-radius: 4px; transition: width 0.5s; }
    .bk-right { display: flex; gap: 6px; flex-shrink: 0; }
    .bk-pct { font-size: 0.72rem; color: #999; width: 30px; text-align: right; }
    .bk-amt { font-size: 0.78rem; font-weight: 600; width: 70px; text-align: right; }

    /* Monthly chart */
    .mc-legend { display: flex; gap: 12px; margin-bottom: 10px; }
    .mc-legend-item { display: flex; align-items: center; gap: 4px; font-size: 0.72rem; color: #888; }
    .mc-dot { width: 8px; height: 8px; border-radius: 2px; }
    .mc-row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
    .mc-row.mc-dim { opacity: 0.3; }
    .mc-label { font-size: 0.75rem; color: #666; width: 24px; flex-shrink: 0; }
    .mc-bars  { flex: 1; display: flex; flex-direction: column; gap: 3px; }
    .mc-bar-wrap { background: #F0F0F0; border-radius: 3px; height: 6px; overflow: hidden; }
    .mc-bar { height: 100%; border-radius: 3px; transition: width 0.5s; }
    .mc-bar-income  { background: #4CAF50; }
    .mc-bar-expense { background: #EF5350; }
    .mc-amounts { display: flex; flex-direction: column; gap: 1px; width: 70px; text-align: right; flex-shrink: 0; }
    .mc-amounts span { font-size: 0.68rem; font-weight: 600; }

    /* Projects */
    .project-card {
      background: white; border-radius: 16px; padding: 16px;
      margin-bottom: 10px; box-shadow: 0 1px 6px rgba(0,0,0,0.07);
      display: flex; align-items: center; gap: 12px; cursor: pointer; transition: transform 0.1s;
    }
    .project-card:active { transform: scale(0.99); }
    .project-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
    .project-info { flex: 1; min-width: 0; }
    .project-name   { font-size: 1.05rem; font-weight: 600; }
    .project-client { font-size: 0.73rem; color: #999; margin-top: 2px; }
    .project-status { font-size: 0.65rem; padding: 3px 8px; border-radius: 8px; font-weight: 500; white-space: nowrap; }
    .status-active    { background: #E8F5E9; color: #2E7D32; }
    .status-completed { background: #E3F2FD; color: #1565C0; }
    .status-paused    { background: #F5F5F5; color: #757575; }
    .status-pending   { background: #FFF3E0; color: #E65100; }
    .status-cancelled { background: #FFEBEE; color: #C62828; }
    .pay-none    { background: #FFEBEE; color: #C62828; }
    .pay-partial { background: #FFF3E0; color: #E65100; }
    .pay-done    { background: #E8F5E9; color: #2E7D32; }
    .proj-detail-row { display:flex; padding:9px 0; border-bottom:1px solid #F3F3F3; gap:10px; }
    .proj-detail-row:last-child { border-bottom:none; }
    .proj-detail-label { font-size:0.75rem; color:#999; width:80px; flex-shrink:0; padding-top:1px; }
    .proj-detail-value { font-size:0.85rem; font-weight:500; flex:1; }
    .project-nums { text-align: right; flex-shrink: 0; }
    .project-balance { font-size: 0.88rem; font-weight: 700; }
    .project-count  { font-size: 0.7rem; color: #AAA; margin-top: 2px; }

    /* Settings */
    .tag-list { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
    .tag-item { display: flex; align-items: center; gap: 4px; padding: 5px 10px; background: #F5F5F5; border-radius: 20px; font-size: 0.8rem; }
    .tag-del { background: none; border: none; cursor: pointer; color: #CCC; font-size: 0.72rem; padding: 0; transition: color 0.15s; }
    .tag-del:hover { color: #E53935; }
    .add-tag-row { display: flex; gap: 8px; margin-top: 10px; }
    .add-tag-row input { flex: 1; }
    .add-tag-btn { padding: 9px 14px; background: #1C1C1C; color: white; border: none; border-radius: 10px; cursor: pointer; font-size: 0.82rem; white-space: nowrap; font-family: inherit; }

    /* Modal */
    .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.45); z-index: 500; align-items: flex-end; justify-content: center; }
    .modal-overlay.open { display: flex; }
    .modal-sheet { background: white; border-radius: 24px 24px 0 0; padding: 24px 20px; width: 100%; max-width: 640px; max-height: 88vh; overflow-y: auto; }
    .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
    .modal-title { font-size: 1rem; font-weight: 600; }
    .btn-close { background: none; border: none; font-size: 1.1rem; cursor: pointer; color: #999; }

    /* Toast */
    #toast {
      position: fixed; bottom: 90px; left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: #1C1C1C; color: white; padding: 9px 18px;
      border-radius: 20px; font-size: 0.82rem; opacity: 0;
      pointer-events: none; transition: all 0.25s; z-index: 999; white-space: nowrap;
    }
    #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* Misc */
    .empty { text-align: center; color: #CCC; padding: 28px 0; font-size: 0.85rem; }
    .btn-row { display: flex; gap: 8px; }
    .btn-row > * { flex: 1; }
    .back-btn { background: none; border: none; cursor: pointer; font-size: 1rem; color: #666; padding: 0; font-family: inherit; }

    @media (max-width: 400px) {
      .stats { gap: 7px; }
      .stat-card { padding: 11px 6px; }
      .stat-value { font-size: 0.92rem; }
      .form-grid { grid-template-columns: 1fr; }
      .bk-cat { width: 80px; }
    }
  </style>
</head>
<body>

<div class="app-header container">
  <div class="app-title" id="app-title">💰 Boyu 財務管理</div>
  <div class="sync-dot loading" id="sync-dot"></div>
</div>

<div class="container">

  <!-- ═══════════════ 記帳頁 ═══════════════ -->
  <div class="view active" id="view-ledger">

    <div class="stats">
      <div class="stat-card"><div class="stat-label">本月收入</div><div class="stat-value c-income" id="l-income">$0</div></div>
      <div class="stat-card"><div class="stat-label">本月支出</div><div class="stat-value c-expense" id="l-expense">$0</div></div>
      <div class="stat-card"><div class="stat-label">結餘</div><div class="stat-value" id="l-balance">$0</div></div>
    </div>

    <div class="card">
      <div class="card-title">新增記帳</div>
      <div class="edit-banner" id="edit-banner">
        <span>✏️ 編輯模式</span>
        <button class="btn-cancel-edit" onclick="cancelEdit()">取消</button>
      </div>
      <div class="toggle">
        <button class="toggle-btn" id="btn-expense" onclick="setType('expense')">支出</button>
        <button class="toggle-btn on-income"  id="btn-income"  onclick="setType('income')">收入</button>
      </div>
      <div class="form-grid">
        <div class="form-group" style="margin-bottom:0">
          <span class="form-label">金額（元）</span>
          <input type="number" id="inp-amount" placeholder="0" min="0" inputmode="numeric">
        </div>
        <div class="form-group" style="margin-bottom:0">
          <span class="form-label">日期</span>
          <input type="date" id="inp-date">
        </div>
        <div class="form-group" style="margin-bottom:0">
          <span class="form-label">分類</span>
          <select id="inp-category"></select>
        </div>
        <div class="form-group" style="margin-bottom:0">
          <span class="form-label">付款方式</span>
          <select id="inp-payment"></select>
        </div>
      </div>
      <div class="form-group">
        <span class="form-label">專案標籤</span>
        <select id="inp-project"><option value="">不標記專案</option></select>
      </div>
      <div class="form-group">
        <span class="form-label">備註（可不填）</span>
        <textarea id="inp-note" placeholder="客戶名稱、項目備忘…"></textarea>
      </div>
      <button class="btn-primary" id="btn-submit" onclick="submitForm()">＋ 記錄</button>
    </div>

    <div class="filter-bar">
      <select id="filter-month" onchange="renderLedger()"></select>
      <select id="filter-type" onchange="renderLedger()">
        <option value="all">全部</option>
        <option value="expense">支出</option>
        <option value="income">收入</option>
      </select>
      <select id="filter-cat" onchange="renderLedger()"><option value="all">所有分類</option></select>
      <button class="btn-export" onclick="exportCSV('month')">CSV</button>
    </div>

    <div class="card">
      <div class="list-header" id="ledger-header">載入中…</div>
      <div id="tx-list"></div>
    </div>
  </div>

  <!-- ═══════════════ 統計頁 ═══════════════ -->
  <div class="view" id="view-stats">
    <div class="stats">
      <div class="stat-card"><div class="stat-label">全年收入</div><div class="stat-value c-income" id="s-income">$0</div></div>
      <div class="stat-card"><div class="stat-label">全年支出</div><div class="stat-value c-expense" id="s-expense">$0</div></div>
      <div class="stat-card"><div class="stat-label">全年結餘</div><div class="stat-value" id="s-balance">$0</div></div>
    </div>

    <div class="card">
      <div class="section-header">
        <div class="section-title">📅 月份趨勢</div>
        <select id="stats-year" onchange="onStatsYearChange()" style="width:auto;padding:5px 8px;font-size:0.78rem;border-radius:8px"></select>
      </div>
      <div id="monthly-chart"></div>
    </div>
  </div>

  <!-- ═══════════════ 專案頁 ═══════════════ -->
  <div class="view" id="view-projects">
    <div style="display:flex;justify-content:flex-end;margin-bottom:14px">
      <button class="btn-primary" style="width:auto;padding:10px 18px" onclick="openProjectModal()">＋ 新增專案</button>
    </div>
    <div id="project-list"></div>
  </div>

  <!-- 專案詳細 -->
  <div class="view" id="view-project-detail">
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:16px">
      <button class="back-btn" onclick="switchTab('projects')">‹ 返回</button>
      <div id="pd-title" style="font-size:1.05rem;font-weight:700;flex:1"></div>
      <button id="pd-edit-btn" style="background:none;border:none;cursor:pointer;font-size:0.8rem;color:#888;font-family:inherit">編輯</button>
    </div>
    <div class="stats">
      <div class="stat-card"><div class="stat-label">總收入</div><div class="stat-value c-income" id="pd-income">$0</div></div>
      <div class="stat-card"><div class="stat-label">總支出</div><div class="stat-value c-expense" id="pd-expense">$0</div></div>
      <div class="stat-card"><div class="stat-label">利潤</div><div class="stat-value" id="pd-balance">$0</div></div>
    </div>
    <div id="pd-info"></div>
    <div class="card">
      <div class="list-header" id="pd-header">交易記錄</div>
      <div id="pd-tx-list"></div>
    </div>
  </div>

  <!-- ═══════════════ 設定頁 ═══════════════ -->
  <div class="view" id="view-settings">
    <div class="card">
      <div class="card-title">📂 收入分類</div>
      <div id="income-cats-list" class="tag-list"></div>
      <div class="add-tag-row">
        <input type="text" id="new-income-cat" placeholder="新增收入分類…">
        <button class="add-tag-btn" onclick="addCat('income')">新增</button>
      </div>
    </div>
    <div class="card">
      <div class="card-title">📂 支出分類</div>
      <div id="expense-cats-list" class="tag-list"></div>
      <div class="add-tag-row">
        <input type="text" id="new-expense-cat" placeholder="新增支出分類…">
        <button class="add-tag-btn" onclick="addCat('expense')">新增</button>
      </div>
    </div>
    <div class="card">
      <div class="card-title">💳 付款方式</div>
      <div id="payment-list" class="tag-list"></div>
      <div class="add-tag-row">
        <input type="text" id="new-payment" placeholder="新增付款方式…">
        <button class="add-tag-btn" onclick="addPayment()">新增</button>
      </div>
    </div>
    <div class="card">
      <div class="card-title">📤 資料匯出</div>
      <div class="btn-row">
        <button class="btn-secondary" onclick="exportCSV('month')">匯出本月 CSV</button>
        <button class="btn-secondary" onclick="exportCSV('all')">匯出全部 CSV</button>
      </div>
    </div>
    <div class="card" style="border:1.5px solid #FFCDD2">
      <div class="card-title" style="color:#C62828">⚠️ 危險操作</div>
      <button class="btn-secondary" style="border-color:#EF9A9A;color:#C62828" onclick="clearAllData()">清除所有資料</button>
    </div>
  </div>

</div><!-- /container -->

<!-- Bottom Nav -->
<nav class="bottom-nav">
  <button class="nav-btn active" id="nav-ledger"   onclick="switchTab('ledger')">  <span class="nav-icon">📝</span><span>記帳</span></button>
  <button class="nav-btn"        id="nav-stats"    onclick="switchTab('stats')">   <span class="nav-icon">📊</span><span>統計</span></button>
  <button class="nav-btn"        id="nav-projects" onclick="switchTab('projects')"><span class="nav-icon">📁</span><span>專案</span></button>
  <button class="nav-btn"        id="nav-settings" onclick="switchTab('settings')"><span class="nav-icon">⚙️</span><span>設定</span></button>
</nav>

<!-- Project Modal -->
<div class="modal-overlay" id="modal-project" onclick="e=>e.target===this&&closeProjectModal()">
  <div class="modal-sheet">
    <div class="modal-header">
      <div class="modal-title" id="modal-proj-title">新增專案</div>
      <button class="btn-close" onclick="closeProjectModal()">✕</button>
    </div>

    <div style="font-size:0.7rem;font-weight:600;color:#BBB;letter-spacing:0.06em;margin-bottom:10px">基本資訊</div>
    <div class="form-group"><span class="form-label">專案名稱</span><input type="text" id="mp-name" placeholder="例：故宮書法展"></div>
    <div class="form-group"><span class="form-label">客戶 / 單位</span><input type="text" id="mp-client" placeholder="例：國立故宮博物院"></div>
    <div class="form-grid">
      <div class="form-group" style="margin-bottom:0">
        <span class="form-label">專案類型</span>
        <select id="mp-type">
          <option value="">請選擇</option>
          <option>書法</option><option>品牌設計</option><option>空間設計</option>
          <option>藝術創作</option><option>講座</option><option>其他</option>
        </select>
      </div>
      <div class="form-group" style="margin-bottom:0">
        <span class="form-label">狀態</span>
        <select id="mp-status" onchange="onStatusChange()">
          <option value="洽談中">洽談中</option>
          <option value="進行中">進行中</option>
          <option value="待付款">待付款</option>
          <option value="已完成">已完成</option>
          <option value="已取消">已取消</option>
        </select>
      </div>
    </div>

    <div style="font-size:0.7rem;font-weight:600;color:#BBB;letter-spacing:0.06em;margin:14px 0 10px">時程</div>
    <div class="form-grid">
      <div class="form-group" style="margin-bottom:0"><span class="form-label">開始日期</span><input type="date" id="mp-start"></div>
      <div class="form-group" style="margin-bottom:0"><span class="form-label">截止日期</span><input type="date" id="mp-end"></div>
    </div>

    <div style="font-size:0.7rem;font-weight:600;color:#BBB;letter-spacing:0.06em;margin:14px 0 10px">財務</div>
    <div class="form-grid">
      <div class="form-group" style="margin-bottom:0"><span class="form-label">報價總額（元）</span><input type="number" id="mp-quote" placeholder="0" min="0" inputmode="numeric"></div>
      <div class="form-group" style="margin-bottom:0">
        <span class="form-label">付款狀態</span>
        <select id="mp-pay-status">
          <option>未收款</option><option>已收訂金</option><option>部分付款</option><option>已結清</option>
        </select>
      </div>
    </div>
    <div class="form-group">
      <span class="form-label">付款條件</span>
      <select id="mp-pay-terms">
        <option value="">請選擇</option>
        <option>一次付清</option><option>50% / 50%</option><option>分三期</option><option>驗收後付款</option><option>其他</option>
      </select>
    </div>

    <div style="font-size:0.7rem;font-weight:600;color:#BBB;letter-spacing:0.06em;margin:4px 0 10px">聯絡資訊</div>
    <div class="form-grid">
      <div class="form-group" style="margin-bottom:0"><span class="form-label">聯絡窗口</span><input type="text" id="mp-contact-name" placeholder="姓名"></div>
      <div class="form-group" style="margin-bottom:0"><span class="form-label">聯絡方式</span><input type="text" id="mp-contact-info" placeholder="電話 / Email / Line"></div>
    </div>

    <div style="font-size:0.7rem;font-weight:600;color:#BBB;letter-spacing:0.06em;margin:14px 0 10px">其他</div>
    <div class="form-group"><span class="form-label">備註</span><textarea id="mp-note" placeholder="專案說明、備忘…" style="min-height:60px"></textarea></div>

    <button class="btn-primary" onclick="saveProject()">儲存專案</button>
    <button id="btn-delete-project" style="display:none;width:100%;margin-top:10px;padding:11px;background:none;border:1.5px solid #FFCDD2;border-radius:12px;color:#C62828;font-size:0.88rem;cursor:pointer;font-family:inherit" onclick="deleteProject()">刪除專案</button>
  </div>
</div>

<div id="toast"></div>

<script>
  const SB_URL = 'https://dwbxuhqhxtvsryzzqsgp.supabase.co';
  const SB_KEY = 'sb_publishable_zmCiLOJx3GxYOxda_nYKMQ_DgcR9Srb';

  const DEFAULT_CATS = {
    income:  ['🖌️ 書法收入','🎨 設計收入','💰 版稅授權','🛍️ 銷售收入','📦 其他收入'],
    expense: ['🍱 餐飲','🚇 交通','🛒 購物','🏠 住宿','🏡 居家用品',
              '💊 醫療健康','🛡️ 保險','📱 數位訂閱','📚 學習進修',
              '✈️ 旅遊','🎬 器材道具','💼 工作支出','🧾 會計稅務','💡 其他支出']
  };
  const DEFAULT_PAYS = ['轉帳','現金','信用卡','Line Pay','街口支付','其他'];

  let db, txs = [], projects = [];
  let currentType = 'income', currentTab = 'ledger', statPeriod = 'month';
  let editingId = null, editingProjId = null;

  let settings = { income_cats: [...DEFAULT_CATS.income], expense_cats: [...DEFAULT_CATS.expense], pays: [...DEFAULT_PAYS] };

  function loadSettings() {
    const s = localStorage.getItem('boyu_settings_v2');
    if (s) settings = JSON.parse(s);
  }
  function saveSettings() { localStorage.setItem('boyu_settings_v2', JSON.stringify(settings)); }

  // ── Init ──────────────────────────────────
  async function init() {
    loadSettings();
    db = window.supabase.createClient(SB_URL, SB_KEY);
    setType('income');
    const today = new Date();
    document.getElementById('inp-date').value = localDateStr(today);
    buildMonthFilter();
    buildStatsYearSelect();
    renderSettingsPage();
    await loadAll();
  }

  async function loadAll() {
    setSyncDot('loading');
    const [txRes, prRes] = await Promise.all([
      db.from('transactions').select('*').order('date', { ascending: false }),
      db.from('projects').select('*').order('created_at', { ascending: false })
    ]);
    if (txRes.error || prRes.error) {
      setSyncDot('err'); showToast('無法連線，使用本機快取');
      txs      = JSON.parse(localStorage.getItem('boyu_txs')  || '[]');
      projects = JSON.parse(localStorage.getItem('boyu_prjs') || '[]');
    } else {
      setSyncDot('ok');
      txs = txRes.data; projects = prRes.data;
      localStorage.setItem('boyu_txs',  JSON.stringify(txs));
      localStorage.setItem('boyu_prjs', JSON.stringify(projects));
    }
    refreshCatFilter(); refreshProjSelect();
    renderLedger(); renderStats(); renderProjects();
  }

  // ── Helpers ───────────────────────────────
  function localDateStr(d) {
    return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
  }
  function localYM(d) { return `${d.getFullYear()}-${pad(d.getMonth()+1)}`; }
  function pad(n) { return String(n).padStart(2,'0'); }

  function setSyncDot(s) {
    const d = document.getElementById('sync-dot');
    d.className = 'sync-dot ' + s;
    d.title = s === 'ok' ? '已同步' : s === 'err' ? '連線失敗' : '同步中…';
  }
  function showToast(msg) {
    const el = document.getElementById('toast');
    el.textContent = msg; el.classList.add('show');
    setTimeout(() => el.classList.remove('show'), 2200);
  }
  function saveLocal() {
    localStorage.setItem('boyu_txs',  JSON.stringify(txs));
    localStorage.setItem('boyu_prjs', JSON.stringify(projects));
  }

  // ── Tab nav ───────────────────────────────
  const MAIN_TABS = ['ledger','stats','projects','settings'];
  function switchTab(tab) {
    currentTab = tab;
    MAIN_TABS.forEach(t => {
      document.getElementById('view-'+t)?.classList.toggle('active', t === tab);
      document.getElementById('nav-'+t)?.classList.toggle('active',  t === tab);
    });
    document.getElementById('view-project-detail').classList.toggle('active', tab === 'project-detail');
    if (tab === 'stats')    renderStats();
    if (tab === 'projects') renderProjects();
    if (tab === 'settings') renderSettingsPage();
  }

  // ── Ledger ────────────────────────────────
  function buildMonthFilter() {
    const today = new Date(), sel = document.getElementById('filter-month');
    const opts = [];
    const start = new Date(2026, 3, 1); // 2026-04
    const end   = new Date(2028, 3, 1); // 2028-04
    for (let d = new Date(start); d <= end; d.setMonth(d.getMonth() + 1)) {
      const v = localYM(d);
      opts.push(`<option value="${v}">${d.getFullYear()}年${d.getMonth()+1}月</option>`);
    }
    // 最新月份在最上面
    opts.reverse();
    sel.innerHTML = opts.join(''); sel.value = localYM(today);
  }

  function setType(t) {
    currentType = t;
    document.getElementById('btn-expense').className = 'toggle-btn' + (t==='expense' ? ' on-expense' : '');
    document.getElementById('btn-income').className  = 'toggle-btn' + (t==='income'  ? ' on-income'  : '');
    const cats = t === 'income' ? settings.income_cats : settings.expense_cats;
    document.getElementById('inp-category').innerHTML = cats.map(c=>`<option>${c}</option>`).join('');
  }

  function refreshCatFilter() {
    const all = [...new Set(txs.map(t => t.cat))];
    const sel = document.getElementById('filter-cat'), cur = sel.value;
    sel.innerHTML = '<option value="all">所有分類</option>' + all.map(c=>`<option value="${c}">${c}</option>`).join('');
    if (cur && cur !== 'all' && all.includes(cur)) sel.value = cur;
  }

  function refreshProjSelect() {
    document.getElementById('inp-project').innerHTML =
      '<option value="">不標記專案</option>' +
      projects.map(p=>`<option value="${p.id}">${p.name}</option>`).join('');
    document.getElementById('inp-payment').innerHTML =
      settings.pays.map(p=>`<option>${p}</option>`).join('');
  }

  function renderLedger() {
    const month = document.getElementById('filter-month').value;
    const tf    = document.getElementById('filter-type').value;
    const cf    = document.getElementById('filter-cat').value;
    const mTxs  = txs.filter(t => t.date.startsWith(month));
    const inc   = mTxs.filter(t=>t.type==='income').reduce((s,t)=>s+Number(t.amount),0);
    const exp   = mTxs.filter(t=>t.type==='expense').reduce((s,t)=>s+Number(t.amount),0);
    const bal   = inc - exp;
    document.getElementById('l-income').textContent  = '$' + inc.toLocaleString();
    document.getElementById('l-expense').textContent = '$' + exp.toLocaleString();
    const bEl = document.getElementById('l-balance');
    bEl.textContent = '$' + bal.toLocaleString();
    bEl.className   = 'stat-value' + (bal>0?' c-income':bal<0?' c-expense':'');

    let list = [...mTxs];
    if (tf !== 'all') list = list.filter(t=>t.type===tf);
    if (cf !== 'all') list = list.filter(t=>t.cat===cf);
    list.sort((a,b)=>b.date.localeCompare(a.date)||b.id.localeCompare(a.id));

    document.getElementById('ledger-header').textContent = `交易記錄（共 ${list.length} 筆）`;
    const el = document.getElementById('tx-list');
    if (!list.length) { el.innerHTML = '<div class="empty">這個月還沒有記錄</div>'; return; }

    el.innerHTML = list.map(t => {
      const emoji = t.cat.split(' ')[0];
      const bg    = t.type==='income' ? 'bg-income' : 'bg-expense';
      const sign  = t.type==='income' ? '+' : '-';
      const col   = t.type==='income' ? '#2E7D32' : '#C62828';
      const sub   = t.note ? `${t.date}・${t.note}` : t.date;
      const proj  = t.project_id ? projects.find(p=>p.id===t.project_id) : null;
      const tag   = proj ? `<span class="tx-proj-tag" style="background:${proj.color}22;color:${proj.color}">📁${proj.name}</span>` : '';
      return `<div class="tx-item">
        <div class="tx-icon ${bg}">${emoji}</div>
        <div class="tx-info">
          <div class="tx-title">${t.cat}・${t.pay}${tag}</div>
          <div class="tx-sub">${sub}</div>
        </div>
        <div class="tx-right">
          <span class="tx-amount" style="color:${col}">${sign}$${Number(t.amount).toLocaleString()}</span>
          <button class="btn-icon" onclick="editTx('${t.id}')" style="color:#BBA">✎</button>
          <button class="btn-icon del" onclick="delTx('${t.id}')">✕</button>
        </div>
      </div>`;
    }).join('');
  }

  function submitForm() { if (editingId) updateTx(); else addTx(); }

  function editTx(id) {
    const t = txs.find(x=>x.id===id); if (!t) return;
    editingId = id;
    setType(t.type);
    document.getElementById('inp-amount').value   = t.amount;
    document.getElementById('inp-date').value     = t.date;
    document.getElementById('inp-category').value = t.cat;
    document.getElementById('inp-payment').value  = t.pay;
    document.getElementById('inp-note').value     = t.note || '';
    document.getElementById('inp-project').value  = t.project_id || '';
    document.getElementById('btn-submit').textContent = '✓ 更新記錄';
    document.getElementById('edit-banner').classList.add('show');
    if (currentTab !== 'ledger') switchTab('ledger');
    document.getElementById('view-ledger').scrollIntoView({ behavior: 'smooth', block: 'start' });
  }

  function cancelEdit() {
    editingId = null;
    document.getElementById('inp-amount').value = '';
    document.getElementById('inp-note').value   = '';
    document.getElementById('btn-submit').textContent = '＋ 記錄';
    document.getElementById('edit-banner').classList.remove('show');
  }

  async function addTx() {
    const amount = parseFloat(document.getElementById('inp-amount').value);
    const date   = document.getElementById('inp-date').value;
    const cat    = document.getElementById('inp-category').value;
    const pay    = document.getElementById('inp-payment').value;
    const note   = document.getElementById('inp-note').value.trim();
    const projId = document.getElementById('inp-project').value || null;
    if (!amount || amount <= 0) { showToast('請輸入金額'); return; }
    if (!date) { showToast('請選擇日期'); return; }
    const tx = { id: Date.now().toString(), type: currentType, amount, date, cat, pay, note, project_id: projId };
    // 先存本機，立即生效
    txs.unshift(tx); saveLocal();
    document.getElementById('inp-amount').value = '';
    document.getElementById('inp-note').value   = '';
    refreshCatFilter(); renderLedger(); showToast('已記錄 ✓');
    document.getElementById('btn-submit').disabled = true;
    // 背景同步 Supabase
    setSyncDot('loading');
    const { error } = await db.from('transactions').insert(tx);
    setSyncDot(error ? 'err' : 'ok');
    document.getElementById('btn-submit').disabled = false;
  }

  async function updateTx() {
    const amount = parseFloat(document.getElementById('inp-amount').value);
    const date   = document.getElementById('inp-date').value;
    const cat    = document.getElementById('inp-category').value;
    const pay    = document.getElementById('inp-payment').value;
    const note   = document.getElementById('inp-note').value.trim();
    const projId = document.getElementById('inp-project').value || null;
    if (!amount || amount <= 0) { showToast('請輸入金額'); return; }
    const updates = { type: currentType, amount, date, cat, pay, note, project_id: projId };
    document.getElementById('btn-submit').disabled = true; setSyncDot('loading');
    const { error } = await db.from('transactions').update(updates).eq('id', editingId);
    if (error) { setSyncDot('err'); showToast('更新失敗'); }
    else {
      setSyncDot('ok');
      const i = txs.findIndex(t=>t.id===editingId);
      if (i !== -1) txs[i] = { ...txs[i], ...updates };
      saveLocal(); cancelEdit(); refreshCatFilter(); renderLedger(); showToast('已更新 ✓');
    }
    document.getElementById('btn-submit').disabled = false;
  }

  async function delTx(id) {
    if (!confirm('確定刪除這筆記錄？')) return;
    setSyncDot('loading');
    const { error } = await db.from('transactions').delete().eq('id', id);
    if (error) { setSyncDot('err'); showToast('刪除失敗'); return; }
    setSyncDot('ok'); txs = txs.filter(t=>t.id!==id); saveLocal(); refreshCatFilter(); renderLedger();
  }

  // ── Stats ─────────────────────────────────
  function buildStatsYearSelect() {
    const sel = document.getElementById('stats-year');
    sel.innerHTML = ['2028','2027','2026'].map(y=>`<option value="${y}">${y}年</option>`).join('');
    sel.value = '2026';
    buildStatsMonthSelect('2026');
  }

  function buildStatsMonthSelect(year) {
    const today = new Date(), sel = document.getElementById('stats-month');
    const monthOpts = Array.from({length:12},(_,i)=>{
      const v = `${year}-${pad(i+1)}`;
      return `<option value="${v}">${i+1}月</option>`;
    }).join('');
    sel.innerHTML = `<option value="${year}">全年</option>` + monthOpts;
    if (year == today.getFullYear()) sel.value = localYM(today);
    else sel.value = year; // default to 全年 for other years
  }

  function onStatsYearChange() {
    buildStatsMonthSelect(document.getElementById('stats-year').value);
    renderStats();
  }

  function setPeriod(p) {
    statPeriod = p;
    document.getElementById('btn-period-month').className = 'period-btn' + (p==='month'?' active':'');
    document.getElementById('btn-period-year').className  = 'period-btn' + (p==='year'?' active':'');
    document.getElementById('stats-month-wrap').style.display = p==='month' ? '' : 'none';
    renderStats();
  }

  function renderStats() {
    if (currentTab !== 'stats') return;
    const year = document.getElementById('stats-year').value;
    const yTxs = txs.filter(t=>t.date.startsWith(year));
    const inc  = yTxs.filter(t=>t.type==='income').reduce((s,t)=>s+Number(t.amount),0);
    const exp  = yTxs.filter(t=>t.type==='expense').reduce((s,t)=>s+Number(t.amount),0);
    const bal  = inc - exp;
    document.getElementById('s-income').textContent  = '$'+inc.toLocaleString();
    document.getElementById('s-expense').textContent = '$'+exp.toLocaleString();
    const bEl = document.getElementById('s-balance');
    bEl.textContent = '$'+bal.toLocaleString();
    bEl.className = 'stat-value'+(bal>0?' c-income':bal<0?' c-expense':'');
    renderMonthlyChart(year);
  }

  function renderMonthlyChart(year) {
    const months = Array.from({length:12},(_,i)=>{
      const k   = `${year}-${pad(i+1)}`;
      const mT  = txs.filter(t=>t.date.startsWith(k));
      const inc = mT.filter(t=>t.type==='income').reduce((s,t)=>s+Number(t.amount),0);
      const exp = mT.filter(t=>t.type==='expense').reduce((s,t)=>s+Number(t.amount),0);
      return { m:i+1, inc, exp, bal:inc-exp };
    });
    const maxV = Math.max(...months.map(m=>Math.max(m.inc,m.exp)),1);
    document.getElementById('monthly-chart').innerHTML =
      `<div class="mc-legend">
        <div class="mc-legend-item"><div class="mc-dot" style="background:#4CAF50"></div>收入</div>
        <div class="mc-legend-item"><div class="mc-dot" style="background:#EF5350"></div>支出</div>
        <div class="mc-legend-item"><div class="mc-dot" style="background:#BBB"></div>結餘</div>
      </div>` +
      months.map(m => {
        const dim = m.inc===0 && m.exp===0;
        const iW  = Math.round(m.inc/maxV*100), eW = Math.round(m.exp/maxV*100);
        const balCol = m.bal>0?'#2E7D32':m.bal<0?'#C62828':'#BBB';
        return `<div class="mc-row${dim?' mc-dim':''}">
          <div class="mc-label">${m.m}月</div>
          <div class="mc-bars">
            <div class="mc-bar-wrap"><div class="mc-bar mc-bar-income"  style="width:${iW}%"></div></div>
            <div class="mc-bar-wrap"><div class="mc-bar mc-bar-expense" style="width:${eW}%"></div></div>
          </div>
          <div class="mc-amounts">
            <span class="c-income"  style="font-size:0.62rem;opacity:0.75">${m.inc>0?'$'+m.inc.toLocaleString():'—'}</span>
            <span class="c-expense" style="font-size:0.62rem;opacity:0.75">${m.exp>0?'$'+m.exp.toLocaleString():'—'}</span>
            <span style="color:${balCol};font-size:0.88rem;font-weight:700;margin-top:1px">${dim?'—':(m.bal>=0?'+':'')+('$'+m.bal.toLocaleString())}</span>
          </div>
        </div>`;
      }).join('');
  }

  function renderBreakdown(key) {
    const pTxs = txs.filter(t=>t.date.startsWith(key));
    const incT  = pTxs.filter(t=>t.type==='income');
    const expT  = pTxs.filter(t=>t.type==='expense');
    const incS  = incT.reduce((s,t)=>s+Number(t.amount),0);
    const expS  = expT.reduce((s,t)=>s+Number(t.amount),0);

    function group(list, total) {
      const m = {};
      list.forEach(t=>{ m[t.cat]=(m[t.cat]||0)+Number(t.amount); });
      return Object.entries(m).map(([cat,amt])=>({cat,amt,pct:total?Math.round(amt/total*100):0})).sort((a,b)=>b.amt-a.amt);
    }
    function section(lbl, groups, total, color) {
      if (!groups.length) return `<div class="breakdown-title">${lbl}</div><div class="empty" style="padding:12px 0">無資料</div>`;
      return `<div class="breakdown-title">${lbl}・$${total.toLocaleString()}</div>` +
        groups.map(g=>`<div class="bk-row">
          <div class="bk-cat">${g.cat}</div>
          <div class="bk-bar-wrap"><div class="bk-bar" style="width:${g.pct}%;background:${color}"></div></div>
          <div class="bk-right"><span class="bk-pct">${g.pct}%</span><span class="bk-amt">$${g.amt.toLocaleString()}</span></div>
        </div>`).join('');
    }
    document.getElementById('breakdown-content').innerHTML =
      section('💚 收入', group(incT,incS), incS, '#4CAF50') +
      '<div class="section-divider"></div>' +
      section('🔴 支出', group(expT,expS), expS, '#EF5350');
  }

  // ── Projects ──────────────────────────────
  const STATUS_CLS = { '洽談中':'status-paused', '進行中':'status-active', '待付款':'status-pending', '已完成':'status-completed', '已取消':'status-cancelled' };
  const PAY_CLS   = { '未收款':'pay-none', '已收訂金':'pay-partial', '部分付款':'pay-partial', '已結清':'pay-done' };

  function renderProjects() {
    const el = document.getElementById('project-list');
    if (!projects.length) {
      el.innerHTML = '<div class="empty">還沒有專案<br><small>點右上角「＋ 新增專案」開始</small></div>'; return;
    }
    el.innerHTML = projects.map(p => {
      const pT   = txs.filter(t=>t.project_id===p.id);
      const inc  = pT.filter(t=>t.type==='income').reduce((s,t)=>s+Number(t.amount),0);
      const exp  = pT.filter(t=>t.type==='expense').reduce((s,t)=>s+Number(t.amount),0);
      const bal  = inc-exp;
      const sc   = STATUS_CLS[p.status]||'';
      const pc   = PAY_CLS[p.payment_status]||'';
      const dateRange = p.start_date ? `${p.start_date}${p.end_date?' → '+p.end_date:''}` : '';
      const typeTag = p.project_type ? `<span style="font-size:0.78rem;color:#AAA;margin-left:4px">／${p.project_type}</span>` : '';
      return `<div class="project-card" onclick="viewProject('${p.id}')">
        <div class="project-dot" style="background:${p.color||'#9E9E9E'}"></div>
        <div class="project-info">
          <div class="project-name">${p.name}${typeTag}</div>
          <div class="project-client">${dateRange||'—'}</div>
        </div>
        <div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px;flex-shrink:0">
          <span class="project-status ${sc}">${p.status||'—'}</span>
          ${p.payment_status?`<span class="project-status ${pc}">${p.payment_status}</span>`:''}
        </div>
        <div class="project-nums">
          <div class="project-balance" style="color:${bal>0?'#2E7D32':bal<0?'#C62828':'#999'}">$${bal.toLocaleString()}</div>
          ${p.quote_amount?`<div class="project-count">報價 $${Number(p.quote_amount).toLocaleString()}</div>`:`<div class="project-count">${pT.length} 筆</div>`}
        </div>
      </div>`;
    }).join('');
  }

  function viewProject(id) {
    const p = projects.find(x=>x.id===id); if (!p) return;
    document.getElementById('pd-title').textContent = p.name;
    document.getElementById('pd-edit-btn').onclick = () => openProjectModal(id);

    const pT  = txs.filter(t=>t.project_id===id);
    const inc = pT.filter(t=>t.type==='income').reduce((s,t)=>s+Number(t.amount),0);
    const exp = pT.filter(t=>t.type==='expense').reduce((s,t)=>s+Number(t.amount),0);
    const bal = inc-exp;
    document.getElementById('pd-income').textContent  = '$'+inc.toLocaleString();
    document.getElementById('pd-expense').textContent = '$'+exp.toLocaleString();
    const bEl = document.getElementById('pd-balance');
    bEl.textContent = '$'+bal.toLocaleString();
    bEl.className = 'stat-value'+(bal>0?' c-income':bal<0?' c-expense':'');

    // Build info card rows
    const rows = [
      ['客戶', p.client],
      ['類型', p.project_type],
      ['狀態', p.status ? `<span class="project-status ${STATUS_CLS[p.status]||''}">${p.status}</span>` : null],
      ['開始', p.start_date],
      ['截止', p.end_date],
      ['報價', p.quote_amount ? '$'+Number(p.quote_amount).toLocaleString() : null],
      ['付款狀態', p.payment_status ? `<span class="project-status ${PAY_CLS[p.payment_status]||''}">${p.payment_status}</span>` : null],
      ['付款條件', p.payment_terms],
      ['聯絡人', p.contact_name],
      ['聯絡方式', p.contact_info],
      ['備註', p.note],
    ].filter(([,v]) => v);

    const infoHtml = rows.length ? `<div class="card" style="margin-bottom:14px">` +
      rows.map(([l,v])=>`<div class="proj-detail-row"><div class="proj-detail-label">${l}</div><div class="proj-detail-value">${v}</div></div>`).join('') +
      `</div>` : '';

    // Inject info card before tx card — replace pd-info placeholder
    document.getElementById('pd-info').innerHTML = infoHtml;

    const sorted = [...pT].sort((a,b)=>b.date.localeCompare(a.date));
    document.getElementById('pd-header').textContent = `交易記錄（共 ${sorted.length} 筆）`;
    const listEl = document.getElementById('pd-tx-list');
    if (!sorted.length) { listEl.innerHTML = '<div class="empty">這個專案還沒有記錄</div>'; }
    else {
      listEl.innerHTML = sorted.map(t => {
        const emoji = t.cat.split(' ')[0];
        const bg    = t.type==='income'?'bg-income':'bg-expense';
        const sign  = t.type==='income'?'+':'-';
        const col   = t.type==='income'?'#2E7D32':'#C62828';
        return `<div class="tx-item">
          <div class="tx-icon ${bg}">${emoji}</div>
          <div class="tx-info">
            <div class="tx-title">${t.cat}・${t.pay}</div>
            <div class="tx-sub">${t.date}${t.note?'・'+t.note:''}</div>
          </div>
          <div class="tx-right">
            <span class="tx-amount" style="color:${col}">${sign}$${Number(t.amount).toLocaleString()}</span>
            <button class="btn-icon" onclick="editTx('${t.id}')" style="color:#BBA">✎</button>
          </div>
        </div>`;
      }).join('');
    }
    MAIN_TABS.forEach(t => document.getElementById('view-'+t)?.classList.remove('active'));
    document.getElementById('view-project-detail').classList.add('active');
    document.getElementById('nav-projects').classList.add('active');
    currentTab = 'project-detail';
  }

  const STATUS_COLOR = { '洽談中':'#9E9E9E', '進行中':'#4CAF50', '待付款':'#FF9800', '已完成':'#2196F3', '已取消':'#F44336' };

  function onStatusChange() {
    // no-op: color now derived from status automatically
  }

  function openProjectModal(id = null) {
    editingProjId = id;
    const fields = ['mp-name','mp-client','mp-note','mp-contact-name','mp-contact-info'];
    if (id) {
      const p = projects.find(x=>x.id===id);
      document.getElementById('modal-proj-title').textContent = '編輯專案';
      document.getElementById('mp-name').value          = p.name;
      document.getElementById('mp-client').value        = p.client||'';
      document.getElementById('mp-type').value          = p.project_type||'';
      document.getElementById('mp-status').value        = p.status||'進行中';
      document.getElementById('mp-start').value         = p.start_date||'';
      document.getElementById('mp-end').value           = p.end_date||'';
      document.getElementById('mp-quote').value         = p.quote_amount||'';
      document.getElementById('mp-pay-status').value    = p.payment_status||'未收款';
      document.getElementById('mp-pay-terms').value     = p.payment_terms||'';
      document.getElementById('mp-contact-name').value  = p.contact_name||'';
      document.getElementById('mp-contact-info').value  = p.contact_info||'';
      document.getElementById('mp-note').value          = p.note||'';
    } else {
      document.getElementById('modal-proj-title').textContent = '新增專案';
      fields.forEach(x => document.getElementById(x).value = '');
      document.getElementById('mp-type').value       = '';
      document.getElementById('mp-status').value     = '進行中';
      document.getElementById('mp-start').value      = '';
      document.getElementById('mp-end').value        = '';
      document.getElementById('mp-quote').value      = '';
      document.getElementById('mp-pay-status').value = '未收款';
      document.getElementById('mp-pay-terms').value  = '';
    }
    document.getElementById('btn-delete-project').style.display = id ? '' : 'none';
    document.getElementById('modal-project').classList.add('open');
  }

  function closeProjectModal() {
    document.getElementById('modal-project').classList.remove('open');
    editingProjId = null;
  }

  async function deleteProject() {
    if (!confirm('確定刪除這個專案？相關的交易記錄不會被刪除，只會取消專案標記。')) return;
    setSyncDot('loading');
    const { error } = await db.from('projects').delete().eq('id', editingProjId);
    if (error) { setSyncDot('err'); showToast('刪除失敗'); return; }
    // 清除相關交易的 project_id
    await db.from('transactions').update({ project_id: null }).eq('project_id', editingProjId);
    txs = txs.map(t => t.project_id === editingProjId ? { ...t, project_id: null } : t);
    projects = projects.filter(p => p.id !== editingProjId);
    setSyncDot('ok'); saveLocal(); refreshProjSelect(); renderProjects();
    closeProjectModal(); switchTab('projects'); showToast('專案已刪除');
  }

  async function saveProject() {
    const name   = document.getElementById('mp-name').value.trim();
    if (!name) { showToast('請輸入專案名稱'); return; }
    const status = document.getElementById('mp-status').value;
    const data = {
      name,
      client:         document.getElementById('mp-client').value.trim(),
      project_type:   document.getElementById('mp-type').value,
      status,
      color:          STATUS_COLOR[status] || '#9E9E9E',
      start_date:     document.getElementById('mp-start').value,
      end_date:       document.getElementById('mp-end').value,
      quote_amount:   parseFloat(document.getElementById('mp-quote').value) || 0,
      payment_status: document.getElementById('mp-pay-status').value,
      payment_terms:  document.getElementById('mp-pay-terms').value,
      contact_name:   document.getElementById('mp-contact-name').value.trim(),
      contact_info:   document.getElementById('mp-contact-info').value.trim(),
      note:           document.getElementById('mp-note').value.trim(),
    };
    setSyncDot('loading');
    if (editingProjId) {
      const { error } = await db.from('projects').update(data).eq('id', editingProjId);
      if (error) { setSyncDot('err'); showToast('更新失敗'); return; }
      const i = projects.findIndex(p=>p.id===editingProjId);
      if (i !== -1) projects[i] = { ...projects[i], ...data };
    } else {
      const p = { id: Date.now().toString(), ...data };
      const { error } = await db.from('projects').insert(p);
      if (error) { setSyncDot('err'); showToast('新增失敗'); return; }
      projects.unshift(p);
    }
    setSyncDot('ok'); saveLocal(); refreshProjSelect(); renderProjects(); closeProjectModal();
    showToast(editingProjId ? '專案已更新 ✓' : '專案已新增 ✓');
  }

  // ── Settings ──────────────────────────────
  function renderSettingsPage() {
    renderCatList('income'); renderCatList('expense'); renderPayList();
  }
  function renderCatList(type) {
    const cats = type==='income' ? settings.income_cats : settings.expense_cats;
    document.getElementById(type+'-cats-list').innerHTML =
      cats.map((c,i)=>`<div class="tag-item">${c}<button class="tag-del" onclick="removeCat('${type}',${i})">✕</button></div>`).join('');
  }
  function renderPayList() {
    document.getElementById('payment-list').innerHTML =
      settings.pays.map((p,i)=>`<div class="tag-item">${p}<button class="tag-del" onclick="removePay(${i})">✕</button></div>`).join('');
  }
  function addCat(type) {
    const id  = 'new-'+type+'-cat';
    const val = document.getElementById(id).value.trim();
    if (!val) return;
    if (type==='income') settings.income_cats.push(val); else settings.expense_cats.push(val);
    saveSettings(); setType(currentType); renderCatList(type);
    document.getElementById(id).value = ''; showToast('已新增分類 ✓');
  }
  function removeCat(type, i) {
    if (!confirm('確定刪除這個分類？')) return;
    if (type==='income') settings.income_cats.splice(i,1); else settings.expense_cats.splice(i,1);
    saveSettings(); setType(currentType); renderCatList(type);
  }
  function addPayment() {
    const val = document.getElementById('new-payment').value.trim();
    if (!val) return;
    settings.pays.push(val); saveSettings(); refreshProjSelect(); renderPayList();
    document.getElementById('new-payment').value = ''; showToast('已新增付款方式 ✓');
  }
  function removePay(i) {
    if (!confirm('確定刪除？')) return;
    settings.pays.splice(i,1); saveSettings(); refreshProjSelect(); renderPayList();
  }

  function exportCSV(scope) {
    const month = document.getElementById('filter-month').value;
    let list = scope==='month' ? txs.filter(t=>t.date.startsWith(month)) : [...txs];
    list.sort((a,b)=>b.date.localeCompare(a.date));
    const hdr  = '日期,類型,分類,金額,付款方式,專案,備註';
    const rows  = list.map(t=>{
      const pn = t.project_id ? (projects.find(p=>p.id===t.project_id)?.name||'') : '';
      return `${t.date},${t.type==='income'?'收入':'支出'},"${t.cat}",${t.amount},${t.pay},"${pn}","${t.note||''}"`;
    });
    const csv  = '\uFEFF'+[hdr,...rows].join('\n');
    const blob = new Blob([csv],{type:'text/csv;charset=utf-8;'});
    const url  = URL.createObjectURL(blob);
    const a    = Object.assign(document.createElement('a'),{href:url,download:scope==='month'?`Boyu記帳_${month}.csv`:'Boyu記帳_全部.csv'});
    a.click(); URL.revokeObjectURL(url); showToast('已匯出 CSV ✓');
  }

  async function clearAllData() {
    if (!confirm('⚠️ 確定清除所有資料？此操作無法復原！')) return;
    if (!confirm('再次確認：所有記帳與專案資料將永久刪除。')) return;
    setSyncDot('loading');
    await Promise.all([
      db.from('transactions').delete().neq('id',''),
      db.from('projects').delete().neq('id','')
    ]);
    txs=[]; projects=[]; saveLocal(); setSyncDot('ok');
    renderLedger(); renderProjects(); showToast('所有資料已清除');
  }

  init();
</script>
</body>
</html>
